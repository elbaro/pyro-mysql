name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  build:
    name: Build wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - uses: astral-sh/setup-uv@v7
      - run: uv run maturin build --release --compatibility linux
      - uses: actions/upload-artifact@v7
        with:
          name: wheel
          path: target/wheels/*.whl

  test-python-versions:
    name: Pytest / Python ${{ matrix.python-version }}
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    services:
      mysql:
        image: mariadb:12.3-rc
        env:
          MYSQL_USER: test
          MYSQL_PASSWORD: "1234"
          MYSQL_DATABASE: test
          MYSQL_ALLOW_EMPTY_ROOT_PASSWORD: "yes"
          MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
          MARIADB_USER: test
          MARIADB_PASSWORD: "1234"
          MARIADB_DATABASE: test
          MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: "yes"
        ports:
          - 3306:3306
        options: >-
          --health-cmd "healthcheck.sh --connect --innodb_initialized"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/download-artifact@v8
        with:
          name: wheel
          path: wheel
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --no-install-project --python ${{ matrix.python-version }}
      - run: uv pip install wheel/*.whl
      - run: rm -rf pyro_mysql
      - run: uv run --no-sync pytest
        env:
          DATABASE_URL: mysql://test:1234@127.0.0.1/test

  test-db-backends:
    name: Pytest / ${{ matrix.db-image }}
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - db-image: mariadb:10.11
            health-cmd: "healthcheck.sh --connect --innodb_initialized"
          - db-image: mariadb:11.4
            health-cmd: "healthcheck.sh --connect --innodb_initialized"
          - db-image: mariadb:12.3-rc
            health-cmd: "healthcheck.sh --connect --innodb_initialized"
          - db-image: percona/percona-server:8.0
            health-cmd: "mysqladmin ping -h 127.0.0.1 -u root"
          - db-image: percona/percona-server:8.4
            health-cmd: "mysqladmin ping -h 127.0.0.1 -u root"
          - db-image: mysql:8.0
            health-cmd: "mysqladmin ping -h 127.0.0.1 -u root"
          - db-image: mysql:8.4
            health-cmd: "mysqladmin ping -h 127.0.0.1 -u root"
    services:
      mysql:
        image: ${{ matrix.db-image }}
        env:
          MYSQL_USER: test
          MYSQL_PASSWORD: "1234"
          MYSQL_DATABASE: test
          MYSQL_ALLOW_EMPTY_ROOT_PASSWORD: "yes"
          MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
          MARIADB_USER: test
          MARIADB_PASSWORD: "1234"
          MARIADB_DATABASE: test
          MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: "yes"
        ports:
          - 3306:3306
        options: >-
          --health-cmd "${{ matrix.health-cmd }}"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - uses: actions/download-artifact@v8
        with:
          name: wheel
          path: wheel
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --no-install-project --python "3.10"
      - run: uv pip install wheel/*.whl
      - run: rm -rf pyro_mysql
      - run: uv run --no-sync pytest
        env:
          DATABASE_URL: mysql://test:1234@127.0.0.1/test
